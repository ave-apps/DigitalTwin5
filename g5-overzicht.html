<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>G5 Overzicht</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap');

:root {
  --bg: #f5f3ee; --surface: #ffffff; --surface2: #ede9e0;
  --border: #d8d2c4; --text: #2a2520; --text-mid: #7a7060;
  --text-dim: #a89f90; --accent: #2a6fc4; --green: #2a9c4a;
  --warn: #c47a2a; --red: #c42a2a; --stg: #6f2ac4;
  --mgr: #c4442a;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100dvh; }

/* ── Header ── */
.header {
  background: var(--surface); border-bottom: 2px solid var(--border);
  padding: 13px 16px; display: flex; align-items: center; gap: 10px;
  box-shadow: 0 2px 12px #00000010; position: sticky; top: 0; z-index: 10;
}
.header h1 { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; flex: 1; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); flex-shrink: 0; }
#sync-label { font-size: 10px; font-weight: 700; color: var(--text-dim); }
#refresh-btn {
  background: none; border: 1.5px solid var(--border); border-radius: 8px;
  padding: 4px 10px; font-size: 12px; font-weight: 700; cursor: pointer;
  color: var(--text-mid); font-family: 'Nunito', sans-serif;
}
#refresh-btn:active { background: var(--surface2); }

/* ── Rol-indicator ── */
.rol-bar {
  background: var(--surface2); border-bottom: 1px solid var(--border);
  padding: 6px 16px; display: flex; align-items: center; gap: 8px;
  font-size: 11px; color: var(--text-mid); font-weight: 700;
}
.rol-badge {
  font-size: 10px; font-weight: 800; padding: 2px 9px; border-radius: 20px;
  background: var(--accent); color: #fff;
}
.rol-badge.mgr  { background: var(--mgr); }
.rol-badge.ciop { background: var(--stg); }

/* ── Etage blok ── */
.etage-blok {
  margin: 12px 16px;
  background: var(--surface);
  border-radius: 16px; border: 1.5px solid var(--border);
  overflow: hidden; box-shadow: 0 2px 10px #00000008;
}
.etage-header {
  display: flex; align-items: center; gap: 10px;
  padding: 11px 16px; background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
.etage-badge {
  font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
  background: var(--accent); color: #fff;
  padding: 3px 10px; border-radius: 20px;
}
.etage-naam { font-size: 14px; font-weight: 800; flex: 1; }
.etage-count {
  font-size: 11px; font-weight: 700; color: var(--text-dim);
  font-family: 'Space Mono', monospace;
}
.etage-telefoons {
  display: flex; gap: 6px; align-items: center;
}
.tel-chip {
  display: flex; align-items: center; gap: 4px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 20px; padding: 3px 9px;
  font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 700;
  color: var(--accent); text-decoration: none; cursor: pointer;
  transition: background .1s;
}
.tel-chip:hover, .tel-chip:active { background: #e8f0ff; border-color: var(--accent); }
.tel-chip .kant { font-size: 9px; color: var(--text-dim); margin-right: 1px; }

/* ── Geen dienst ── */
.etage-leeg {
  padding: 14px 16px; font-size: 13px; color: var(--text-dim); font-style: italic;
}

/* ── Medewerker rij ── */
.mw-rij {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; flex-direction: column; gap: 8px;
}
.mw-rij:last-child { border-bottom: none; }

.mw-top {
  display: flex; align-items: center; gap: 10px;
}
.mw-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 900; color: #fff; flex-shrink: 0;
}
.mw-info { flex: 1; min-width: 0; }
.mw-naam { font-size: 14px; font-weight: 800; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.mw-functie {
  font-size: 10px; font-weight: 700; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: .5px;
}
.mw-acties { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

/* ── Bel-knoppen ── */
.bel-btn {
  display: flex; align-items: center; gap: 4px;
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 20px; padding: 5px 10px;
  font-family: 'Space Mono', monospace; font-size: 12px; font-weight: 700;
  color: var(--text); text-decoration: none; cursor: pointer;
  transition: background .1s, border-color .1s; white-space: nowrap;
}
.bel-btn:hover, .bel-btn:active { background: #e8f0ff; border-color: var(--accent); color: var(--accent); }
.bel-btn.mobiel { border-color: var(--green); color: var(--green); background: #f0fff5; }
.bel-btn.mobiel:hover { background: #d8ffe8; }
.bel-btn span.label { font-size: 9px; color: var(--text-dim); margin-right: 2px; font-family: 'Nunito', sans-serif; font-weight: 800; text-transform: uppercase; }
.bel-btn.mobiel span.label { color: var(--green); opacity: .7; }

/* ── Tijdstip ── */
.mw-tijd {
  font-family: 'Space Mono', monospace; font-size: 10px;
  color: var(--text-dim);
}

/* ── Stagiair blok ── */
.stg-blok {
  margin-left: 46px;
  background: #f8f4ff; border: 1.5px solid #d4c4f0;
  border-radius: 12px; padding: 10px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
.stg-header { display: flex; align-items: center; gap: 8px; }
.stg-tag {
  font-size: 10px; font-weight: 900; background: var(--stg);
  color: #fff; padding: 2px 8px; border-radius: 20px; letter-spacing: .4px;
}
.stg-naam { font-size: 13px; font-weight: 800; color: var(--stg); flex: 1; }
.stg-kamer {
  font-family: 'Space Mono', monospace; font-size: 11px;
  color: var(--text-mid); font-weight: 700;
}

/* ── Fase indicator ── */
.fase-rij { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
.fase-dot-small {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0;
}
.fase-label-small { font-size: 11px; font-weight: 700; }
.fase-datum-small {
  font-family: 'Space Mono', monospace; font-size: 10px; color: var(--text-dim);
}
.fase-pill {
  font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 20px; white-space: nowrap;
}
.pill-lopend { background: #e8f0ff; color: var(--accent); }
.pill-ok     { background: #e8f8ee; color: var(--green); }
.pill-warn   { background: #fff5e0; color: var(--warn); }
.pill-alert  { background: #ffe8e8; color: var(--red); }
.pill-open   { background: var(--surface2); color: var(--text-dim); }

/* ── Evaluatie badge ── */
.eval-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 10px; font-weight: 700; padding: 2px 8px;
  border-radius: 20px; border: 1.5px solid var(--border);
  color: var(--text-mid);
}
.eval-badge.nadert { border-color: var(--warn); color: var(--warn); background: #fff5e0; }
.eval-badge.verlopen { border-color: var(--red); color: var(--red); background: #ffe8e8; }

/* ── Geen data staat ── */
.leeg-staat {
  text-align: center; padding: 40px 24px; color: var(--text-dim);
}
.leeg-icon { font-size: 36px; margin-bottom: 8px; }
.leeg-tekst { font-size: 13px; }

/* ── Loading ── */
#loading {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; min-height: 60vh; gap: 12px;
  color: var(--text-dim); font-size: 13px;
}
.spinner {
  width: 28px; height: 28px; border: 3px solid var(--border);
  border-top-color: var(--accent); border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Tijdstip header ── */
.update-tijd {
  text-align: center; padding: 6px; font-size: 10px;
  color: var(--text-dim); font-family: 'Space Mono', monospace;
}

/* ── SEIN fallback ── */
.sein-bar {
  margin: 0 16px 16px;
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: 12px; padding: 12px 16px;
  display: flex; align-items: center; gap: 10px;
}
.sein-label { font-size: 12px; font-weight: 700; color: var(--text-mid); flex: 1; }
.sein-num {
  font-family: 'Space Mono', monospace; font-size: 13px;
  font-weight: 700; color: var(--accent); text-decoration: none;
}
.sein-num:hover { text-decoration: underline; }
</style>
</head>
<body>

<div class="header">
  <h1>📋 G5 Overzicht</h1>
  <div class="sync-dot" id="sync-dot"></div>
  <span id="sync-label">Laden…</span>
  <button id="refresh-btn" onclick="laadAlles()">↺</button>
</div>

<div class="rol-bar" id="rol-bar">
  <span>Weergave:</span>
  <span class="rol-badge mgr" id="rol-badge">Manager</span>
  <span style="flex:1"></span>
  <span style="font-size:10px;cursor:pointer;color:var(--accent)" onclick="wisselRol()">wissel rol</span>
</div>

<div id="loading">
  <div class="spinner"></div>
  <span>Data ophalen…</span>
</div>

<div id="content" style="display:none">
  <div class="update-tijd" id="update-tijd"></div>
  <div id="etage-container"></div>

  <!-- SEIN fallback -->
  <div class="sein-bar">
    <span class="sein-label">📌 Algemeen SEIN</span>
    <a class="sein-num" href="tel:0235588000">023 – 558 8000</a>
  </div>
</div>

<script>
// Converteer Sheets decimale tijd (0.xxx) naar HH:MM
function parseTijdIn(val){
  if(!val) return '';
  const s = String(val).trim();
  if(/^\d{2}:\d{2}$/.test(s)) return s;
  const dec = parseFloat(s);
  if(!isNaN(dec) && dec >= 0 && dec < 1){
    const totalMin = Math.round(dec * 24 * 60);
    return String(Math.floor(totalMin/60)).padStart(2,'0') + ':' + String(totalMin%60).padStart(2,'0');
  }
  const d = new Date(s);
  if(!isNaN(d.getTime())){
    return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }
  return s;
}

const GASWA       = 'https://script.google.com/macros/s/AKfycbyjnk84P0TdzN8rVjd0MFuXWbxmyQI_SMcP00YPSKOSSv692rO3-_XtKQRBKMLyOA1H/exec';
// Fysieke volgorde: 3e bovenaan → BG onderaan (zoals het gebouw staat)
const ETAGE_INFO  = [
  { idx:3, code:'3e', label:'Derde etage'  },
  { idx:2, code:'2e', label:'Tweede etage' },
  { idx:1, code:'1e', label:'Eerste etage' },
  { idx:0, code:'BG', label:'Begane grond' },
];
const FASE_KLEUR  = { lopend:'#2a6fc4', ok:'#2a9c4a', warn:'#c47a2a', alert:'#c42a2a', open:'#a89f90' };
const FASE_LABEL  = { lopend:'Lopend', ok:'Afgerond', warn:'Aandacht', alert:'Probleem', open:'Gepland' };
const FUNCTIE_LBL = { BGLB:'Begeleider B', BGLC:'Begeleider C', CIOP:'CIOP', STG:'Stagiair(e)', MGR:'Manager', MA:'Managementassistent' };

// Rol: 'mgr' ziet altijd mobiel, 'medewerker' ziet alleen mobiel als zichtbaar=true
let huidigeRol = localStorage.getItem('overzicht_rol') || 'mgr';

let dienstData   = {};  // per etage array van records
let stagiairData = [];  // alle stagiairs
let telefoonData = {};  // per kant (0-A, 0-B, etc.)

// ── Rol wissel ───────────────────────────────────────────────────────────────
function wisselRol(){
  huidigeRol = huidigeRol === 'mgr' ? 'medewerker' : 'mgr';
  localStorage.setItem('overzicht_rol', huidigeRol);
  updateRolBar();
  renderAlles();
}

function updateRolBar(){
  const badge = document.getElementById('rol-badge');
  if(huidigeRol === 'mgr'){
    badge.textContent = 'Manager / CIOP';
    badge.className = 'rol-badge mgr';
  } else {
    badge.textContent = 'Medewerker';
    badge.className = 'rol-badge';
  }
}

// ── Data laden ────────────────────────────────────────────────────────────────
async function laadAlles(){
  setSyncStatus('busy');
  try {
    const [resDienst, resStagiair, resTel] = await Promise.all([
      fetch(GASWA, { method:'POST', headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({ action:'pullDienst' }) }),
      fetch(GASWA, { method:'POST', headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({ action:'pullStagiairs' }) }),
      fetch(GASWA, { method:'POST', headers:{'Content-Type':'text/plain'},
        body: JSON.stringify({ action:'pullTelefoon' }) }),
    ]);

    const [dataDienst, dataStagiair, dataTel] = await Promise.all([
      resDienst.json(), resStagiair.json(), resTel.json()
    ]);

    // Dienst
    dienstData = {};
    if(dataDienst.ok && dataDienst.records){
      dataDienst.records.forEach(r => {
        r.etage = Number(r.etage);
        if(!dienstData[r.etage]) dienstData[r.etage] = [];
        dienstData[r.etage].push(r);
      });
    }

    // Stagiairs
    if(dataStagiair.ok && dataStagiair.stagiairs){
      stagiairData = dataStagiair.stagiairs;
    }

    // Telefoon
    if(dataTel.ok && dataTel.telefoon){
      telefoonData = dataTel.telefoon;
    }

    setSyncStatus('ok');
    document.getElementById('update-tijd').textContent =
      'Bijgewerkt: ' + new Date().toLocaleTimeString('nl-NL', {hour:'2-digit',minute:'2-digit'});
    renderAlles();

  } catch(e){
    setSyncStatus('error');
    // Toon toch wat er lokaal is
    renderAlles();
  }
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderAlles(){
  document.getElementById('loading').style.display   = 'none';
  document.getElementById('content').style.display   = 'block';

  const container = document.getElementById('etage-container');
  container.innerHTML = '';

  ETAGE_INFO.forEach(et => {
    const records = dienstData[et.idx] || [];
    const blok = document.createElement('div');
    blok.className = 'etage-blok';

    // Telefoons voor dit etage
    const telA = telefoonData[et.idx + '-A'] || {};
    const telB = telefoonData[et.idx + '-B'] || {};
    const telChips = bouwTelChips(et.idx, telA, telB);

    blok.innerHTML = `
      <div class="etage-header">
        <span class="etage-badge">${et.code}</span>
        <span class="etage-naam">${et.label}</span>
        ${telChips}
        <span class="etage-count">${records.length || 0} pers.</span>
      </div>
    `;

    const body = document.createElement('div');

    if(records.length === 0){
      body.innerHTML = `<div class="etage-leeg">Niemand in dienst</div>`;
    } else {
      // Sorteer: MGR bovenaan, dan op begintijd, dan alfabetisch
      const gesorteerd = [...records].sort((a,b) => {
        if(a.functie === 'MGR') return -1;
        if(b.functie === 'MGR') return 1;
        const ta = parseTijdIn(a.tijdIn) || '99:99';
        const tb = parseTijdIn(b.tijdIn) || '99:99';
        return ta !== tb ? ta.localeCompare(tb) : a.naam.localeCompare(b.naam);
      });
      gesorteerd.forEach(r => {
        body.appendChild(bouwMwRij(r, et.idx));
      });
    }

    blok.appendChild(body);
    container.appendChild(blok);
  });
}

function bouwTelChips(etageIdx, telA, telB){
  let html = '<div class="etage-telefoons">';
  if(telA.intern){
    html += `<a class="tel-chip" href="tel:${telA.intern}" title="A-kant intern">
      <span class="kant">A</span>📞 ${telA.intern}
    </a>`;
  }
  if(telB.intern){
    html += `<a class="tel-chip" href="tel:${telB.intern}" title="B-kant intern">
      <span class="kant">B</span>📞 ${telB.intern}
    </a>`;
  }
  html += '</div>';
  return html;
}

function bouwMwRij(r, etageIdx){
  const rij = document.createElement('div');
  rij.className = 'mw-rij';

  const functieLbl = FUNCTIE_LBL[r.functie] || r.functie || '';

  const tijdInStr  = r.tijdIn  ? parseTijdIn(r.tijdIn)  : '';
  const tijdUitStr = r.tijdUit ? parseTijdIn(r.tijdUit) : '';
  const tijdIn = tijdInStr
    ? `<span class="mw-tijd">in dienst ${tijdInStr}${tijdUitStr ? ' – ' + tijdUitStr : ''}</span>`
    : '';

  // Bel-knoppen: mobiel alleen tonen als manager OF als zichtbaar=true
  const toonMobiel = r.mobiel && (huidigeRol === 'mgr' || r.mobielZichtbaar);
  const mobielBtn  = toonMobiel
    ? `<a class="bel-btn mobiel" href="tel:${r.mobiel.replace(/\s/g,'')}">
        <span class="label">Mobiel</span>${r.mobiel}
       </a>`
    : '';

  rij.innerHTML = `
    <div class="mw-top">
      <div class="mw-avatar" style="background:${r.kleur||'#888'}">${r.afkorting||'?'}</div>
      <div class="mw-info">
        <div class="mw-naam">${r.naam}</div>
        <div class="mw-functie">${functieLbl} ${tijdIn}</div>
      </div>
      <div class="mw-acties">${mobielBtn}</div>
    </div>
  `;

  // Stagiair-koppeling
  if(r.stgBegeleider && r.stgNrs && r.stgNrs.length > 0){
    r.stgNrs.forEach(stgNr => {
      const stg = vindStagiair(stgNr);
      if(stg) rij.appendChild(bouwStgBlok(stg, stgNr));
    });
  }

  return rij;
}

function vindStagiair(stgNr){
  // stgNr is bijv. '01', '02' — stagiair.html slaat op als volgnummer
  // Match op volgorde in stagiairData array (1-based)
  const nr = parseInt(stgNr, 10);
  if(!isNaN(nr) && nr > 0 && nr <= stagiairData.length){
    return stagiairData[nr - 1];
  }
  return null;
}

function bouwStgBlok(stg, stgNr){
  const blok = document.createElement('div');
  blok.className = 'stg-blok';

  // Lopende fase
  const fases     = Array.isArray(stg.fases) ? stg.fases : [];
  const lopend    = fases.find(f => f.status === 'lopend') || fases.find(f => f.status === 'warn') || fases.find(f => f.status === 'alert');
  const evalFase  = fases.find(f => f.code === 'ST-04'); // Evaluatie
  const evalDatum = evalFase?.datum || stg.eind;

  // Evaluatie urgentie
  let evalKlasse = '';
  if(evalDatum){
    const dagen = Math.round((new Date(evalDatum) - new Date()) / 86400000);
    if(dagen < 0)       evalKlasse = 'verlopen';
    else if(dagen <= 14) evalKlasse = 'nadert';
  }

  const faseHtml = lopend ? `
    <div class="fase-rij">
      <div class="fase-dot-small" style="background:${FASE_KLEUR[lopend.status]||'#888'}"></div>
      <span class="fase-label-small">${lopend.label || lopend.code}</span>
      <span class="fase-pill pill-${lopend.status}">${FASE_LABEL[lopend.status]||lopend.status}</span>
      ${lopend.datum ? `<span class="fase-datum-small">${lopend.datum}</span>` : ''}
    </div>` : '';

  const evalHtml = evalDatum ? `
    <span class="eval-badge ${evalKlasse}">
      🎓 Evaluatie: ${evalDatum}
    </span>` : '';

  blok.innerHTML = `
    <div class="stg-header">
      <span class="stg-tag">STG${parseInt(stgNr,10)}</span>
      <span class="stg-naam">${stg.naam}</span>
      <span class="stg-kamer">kamer ${stg.kamer || '?'}</span>
    </div>
    ${faseHtml}
    ${evalHtml ? `<div>${evalHtml}</div>` : ''}
    ${stg.school ? `<div style="font-size:10px;color:var(--text-dim)">🏫 ${stg.school}</div>` : ''}
  `;
  return blok;
}

// ── Sync status ───────────────────────────────────────────────────────────────
function setSyncStatus(state){
  const dot = document.getElementById('sync-dot');
  const lbl = document.getElementById('sync-label');
  const cfg = {
    ok:    { col:'#4cdd8a', txt:'Live'       },
    busy:  { col:'#64b4ff', txt:'Laden…'     },
    error: { col:'#ff4444', txt:'Offline'    },
  }[state] || { col:'#888', txt:'Lokaal' };
  dot.style.background = cfg.col;
  lbl.style.color      = cfg.col;
  lbl.textContent      = cfg.txt;
}

// ── Init ──────────────────────────────────────────────────────────────────────
updateRolBar();
laadAlles();
setInterval(laadAlles, 30 * 1000);
</script>
</body>
</html>
